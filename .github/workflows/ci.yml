name: CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # Use the latest version
        with:
          version: 9 # Specify pnpm version or let it read from packageManager field
          run_install: false # Set to true to automate install, or false to do it manually

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' # Built-in caching for pnpm dependencies

      - name: Install dependencies
        run: pnpm install --frozen-lockfile # Ensures lockfile is not updated in CI

      - name: Run CI tasks
        run: |
          pnpm run test
          pnpm run build
