name: CI

on:
  push:
    branches: ['main', 'dev']
  pull_request:
    branches: ['main']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # LƯU Ý: Đã xóa bản 0.12 vì pnpm hiện đại không hỗ trợ bản Node cổ này
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install

      # BƯỚC 4: Chạy Tests
      - name: Run tests
        run: pnpm run test
